<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation System</title>
</head>
<body>

<h2>Crop Recommendation System</h2>

<form action="/predict" method="post">

<input type="text" name="N" placeholder="Nitrogen"><br><br>
<input type="text" name="P" placeholder="Phosphorus"><br><br>
<input type="text" name="K" placeholder="Potassium"><br><br>
<input type="text" name="temperature" placeholder="Temperature"><br><br>
<input type="text" name="humidity" placeholder="Humidity"><br><br>
<input type="text" name="ph" placeholder="pH"><br><br>
<input type="text" name="rainfall" placeholder="Rainfall"><br><br>

<button type="submit">Predict Crop</button>

</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
