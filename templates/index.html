<!DOCTYPE html>

<html>
<head>
    <title>Crop Recommendation System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }

```
    .container {
        width: 50%;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    input {
        width: 80%;
        padding: 10px;
        margin: 8px;
    }

    button {
        padding: 10px 20px;
        cursor: pointer;
    }

    h1 {
        color: green;
    }
</style>
```

</head>
<body>

```
<div class="container">
    <h1>Crop Recommendation System</h1>

    <form method="POST">
        <input type="number" name="nitrogen" placeholder="Nitrogen" required><br>
        <input type="number" name="phosphorus" placeholder="Phosphorus" required><br>
        <input type="number" name="potassium" placeholder="Potassium" required><br>
        <input type="number" step="0.01" name="temperature" placeholder="Temperature" required><br>
        <input type="number" step="0.01" name="humidity" placeholder="Humidity" required><br>
        <input type="number" step="0.01" name="ph" placeholder="pH Value" required><br>
        <input type="number" step="0.01" name="rainfall" placeholder="Rainfall" required><br>

        <button type="submit">Predict Crop</button>
    </form>

    <h2>{{ prediction_text }}</h2>
</div>
```

</body>
</html>
